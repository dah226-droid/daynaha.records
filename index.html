<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Design Worth Playing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alegreya+Sans+SC:ital,wght@1,500&family=Architects+Daughter&family=Inter:ital,opsz@0,14..32;1,14..32&family=Montserrat:ital,wght@0,400;0,500;0,700;1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="portfolio">
    <header class="top-nav">
      <a class="dot-logo" href="index.html" aria-label="Go to home">
        <img src="assets/logo-circle.png" alt="DH logo" />
      </a>
      <nav class="menu menu-right">
        <a href="work.html">WORK</a>
        <a href="about.html">ABOUT</a>
        <a href="contact.html">CONTACT</a>
      </nav>
    </header>

    <section class="hero">
      <div class="hero-asset">
        <h1>DESIGN WORTH</h1>
        <div class="turntable">
          <img src="assets/hero-vinyl.png" alt="Vinyl turntable" class="hero-vinyl-image" />
          <img src="assets/disc-overlay.png" alt="Spinning disc overlay" class="hero-disc-overlay" />
        </div>
        <p>PLAYING</p>
      </div>
    </section>

    <p class="intro">Each project is a record of thinking ...</p>

    <section class="projects">
      <img class="project-vinyl umami-vinyl" src="assets/umami-vinyl.png" alt="Umami vinyl project" />
      <img class="project-vinyl vybe-vinyl" src="assets/vybe-vinyl.png" alt="Vybe vinyl project" />
      <img class="project-vinyl board-vinyl" src="assets/board-vinyl.png" alt="Board vinyl project" />
      <img class="project-vinyl luag-vinyl" src="assets/luag-vinyl.png" alt="LUAG vinyl project" />
      <img class="project-vinyl tri-vinyl" src="assets/tri-vinyl.png" alt="Tri vinyl project" />
      <img class="project-vinyl mag-vinyl" src="assets/mag-vinyl.png" alt="Magazine vinyl project" />
    </section>

    <footer class="ending">
      <div class="bar"></div>
      <p>YOU'VE REACHED THE END OF THE LIST!</p>
      <h3>FLIP THE RECORD</h3>
    </footer>
  </main>

</html>
